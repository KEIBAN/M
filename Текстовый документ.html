<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Мессенджер</title>
<!-- Подключение округлого шрифта для буквы М -->
<link href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap" rel="stylesheet" />
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 600px;
    margin: 40px auto;
    padding: 10px;
    background-color: #0d0d0d; /* Очень темный фон */
    color: #f0f0f0; /* Светлый цвет текста */
  }
  h2 {
    text-align: center;
    font-size: 150px; /* Увеличен размер для лучшего эффекта */
    margin-bottom: 20px;
    letter-spacing: 8px;
    color: #00ffff; /* Цвет */
    font-family: 'Varela Round', Arial, sans-serif; /* Используем округлый шрифт */
  }
  #messages {
    height: 400px;
    border: 1px solid #333;
    background-color: #1a1a1a; /* Темный фон для области сообщений */
    padding: 10px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    border-radius: 12px; /* Закругленные края */
  }
  .message {
    padding: 10px 15px;
    border-radius: 16px; /* Закругленные края сообщений */
    max-width: 80%;
    word-wrap: break-word;
  }
  .sent {
    background-color: #007bff; /* Голубой для отправленных */
    align-self: flex-end;
    color: #f0f0f0;
  }
  .received {
    background-color: #555; /* Тусклый серый для полученных */
    align-self: flex-start;
    color: #f0f0f0;
  }
  #inputContainer {
    display: flex;
    margin-top: 15px;
  }
  #messageInput {
    flex: 1;
    padding: 12px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    outline: none;
    background-color: #2a2a2a; /* Темный фон для поля ввода */
    color: #f0f0f0;
  }
  #sendBtn, #mediaBtn {
    padding: 12px 20px;
    margin-left: 8px;
    font-size: 16px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: background-color 0.3s;
  }
  #sendBtn {
    background-color: #00ffff; /* Яркий цвет для отправки */
    color: #000;
  }
  #sendBtn:hover {
    background-color: #00cccc;
  }
  #mediaBtn {
    background-color: #00ffff; /* Цвет для медиа */
    color: #000;
  }
  /* Удалили эффект изменения цвета при наведении, чтобы не было красного */
  /*
  #mediaBtn:hover {
    background-color: #ff6347;
  }
  */
</style>
</head>
<body>
<h2>М</h2>
<div id="messages"></div>
<div id="inputContainer">
  <input type="text" id="messageInput" placeholder="Введите сообщение..." />
  <button id="sendBtn">Отправить</button>
  <button id="mediaBtn">Файл</button>
  <input type="file" id="fileInput" style="display:none" />
</div>

<script>
const socket = new WebSocket('ws://localhost:3000'); // Укажите ваш сервер WebSocket

const messagesContainer = document.getElementById('messages');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const mediaBtn = document.getElementById('mediaBtn');
const fileInput = document.getElementById('fileInput');

function addMessage(text, className) {
  const msgDiv = document.createElement('div');
  msgDiv.className = 'message ' + className;
  msgDiv.innerHTML = text;
  messagesContainer.appendChild(msgDiv);
  messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

socket.onopen = () => {
  addMessage('Вы подключены к серверу', 'received');
};

socket.onmessage = (event) => {
  if (typeof event.data === 'string') {
    addMessage(event.data, 'received');
  } else {
    const blob = event.data;
    const url = URL.createObjectURL(blob);
    const img = `<img src="${url}" style="max-width:200px; border-radius:8px;" />`;
    addMessage(img, 'received');
  }
};

socket.onerror = () => {
  addMessage('Ошибка соединения', 'received');
};

socket.onclose = () => {
  addMessage('Соединение закрыто', 'received');
};

sendBtn.onclick = () => {
  const message = messageInput.value.trim();
  if (message === '') return;
  socket.send(message);
  addMessage(message, 'sent');
  messageInput.value = '';
};

messageInput.addEventListener('keyup', (e) => {
  if (e.key === 'Enter') {
    sendBtn.click();
  }
});

mediaBtn.onclick = () => {
  fileInput.click();
};

fileInput.onchange = () => {
  const file = fileInput.files[0];
  if (!file) return;
  socket.send(file);
  addMessage(`Отправлен файл: ${file.name}`, 'sent');
};
</script>
</body>
</html>
